name: Weekly FEMA Retraining Pipeline

on:
  schedule:
    # Runs every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

  workflow_dispatch:

jobs:
  retrain:
    name: Run weekly retraining pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests before retraining
        run: |
          python -m pytest

      - name: Run full retraining pipeline
        run: |
          python -m src.pipeline.run_pipeline

      - name: Upload pipeline summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-summary
          path: pipeline_run_summary.json